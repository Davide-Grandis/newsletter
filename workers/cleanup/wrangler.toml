name = "newsletter-cleanup"
main = "src/index.ts"
compatibility_date = "2025-01-15"

[vars]
RETENTION_DAYS = "90"

[[d1_databases]]
binding = "DB"
database_name = "newsletter_db"
database_id = "REPLACE_WITH_D1_ID"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "newsletter-archive"

[triggers]
crons = ["0 4 * * *"]   # daily at 04:00 UTC
