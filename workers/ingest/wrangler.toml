name = "newsletter-ingest"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# Tunables (batch size, attachment limits, MIME rules, etc.) resolve from the
# D1 `settings` table, falling back to the built-in defaults in
# shared/settings.ts. The author allow-list lives in the D1 `authors` table.

[[d1_databases]]
binding = "DB"
database_name = "newsletter_db"
database_id = "c6995e6a-216d-4ed2-9390-1fc36fb51f1b"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "newsletter-archive"

[[queues.producers]]
binding = "QUEUE"
queue = "newsletter-queue"

# Email Routing route this worker to receive `newsletter@eneanewsletter.it`.
