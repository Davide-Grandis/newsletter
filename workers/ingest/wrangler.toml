name = "newsletter-ingest"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[vars]
ALLOWED_AUTHORS = "you@yourdomain.com"
BATCH_SIZE = "100"
MAX_ATTACHMENT_BYTES = "10485760"            # 10 MB
MAX_TOTAL_ATTACHMENT_BYTES = "20971520"      # 20 MB
MAX_ATTACHMENT_COUNT = "10"
ALLOWED_MIME = "image/*,application/pdf,text/plain,text/csv,application/zip"
BLOCKED_EXTENSIONS = "exe,js,bat,cmd,scr,com,vbs,ps1"
ATTACHMENT_LINK_THRESHOLD_BYTES = "8388608"  # 8 MB -> switch to link mode

[[d1_databases]]
binding = "DB"
database_name = "newsletter_db"
database_id = "REPLACE_WITH_D1_ID"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "newsletter-archive"

[[queues.producers]]
binding = "QUEUE"
queue = "newsletter-queue"

# Email Routing route this worker to receive `newsletter@yourdomain.com`.
