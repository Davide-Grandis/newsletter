name = "newsletter-admin"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# The admin GUI is served on a custom hostname that is fronted by a
# Cloudflare Access application. Do NOT pre-create a DNS record for
# `console.eneanewsletter.it`; this route creates it automatically.
routes = [{ pattern = "console.eneanewsletter.it", custom_domain = true }]

# Mirror the consumer's warmup config so /api/quota can compute the same caps,
# and the sending-identity vars so the Settings page shows their real defaults
# (these otherwise live only on the consumer). Editing them in the console
# writes to the D1 `settings` table, which every worker reads at runtime.
[vars]
FROM_ADDRESS = "Newsletter <newsletter@eneanewsletter.it>"
TRACKING_BASE_URL = "https://track.eneanewsletter.it"
BOUNCE_DOMAIN = "eneanewsletter.it"
WARMUP_START_DATE = ""                                    # e.g. "2026-01-06"
WARMUP_TARGET_WEEKLY = "50000"
WARMUP_SCHEDULE = "[500, 1500, 5000, 12000, 25000, 40000]"
WARMUP_DAILY_CAP_EARLY = "5000"
WARMUP_DAILY_CAP_LATE = "10000"
WARMUP_LATE_START_WEEK = "5"

# Email Routing automation. The admin worker creates/updates/deletes an Email
# Routing rule (inbound_address -> ingest worker) whenever a newsletter is
# managed. Requires the CF_API_TOKEN secret (Email Routing Rules: Edit on this
# zone), set via `wrangler secret put CF_API_TOKEN`.
EMAIL_ROUTING_ZONE_ID = "48ea553ff7c20557f7596ba55eb4cb5e"
INGEST_WORKER_NAME = "newsletter-ingest"
# Newsletter domain, used as the default for inbound-address hints in the GUI.
BASE_DOMAIN = "eneanewsletter.it"

[[d1_databases]]
binding = "DB"
database_name = "newsletter_db"
database_id = "c6995e6a-216d-4ed2-9390-1fc36fb51f1b"

# R2 bucket for static assets (logos, header images, etc.) served by the
# admin GUI. Created in the EU jurisdiction, so the jurisdiction must be
# declared here or the binding won't resolve.
[[r2_buckets]]
binding = "ASSETS_R2"
bucket_name = "newsletter-admin"
jurisdiction = "eu"

# Static SPA built from /web is emitted to ./public by `npm run build:web`.
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Auth: this worker MUST be deployed behind a Cloudflare Access application.
# It has no secret of its own and trusts the
# `Cf-Access-Authenticated-User-Email` header injected by the Access edge.
