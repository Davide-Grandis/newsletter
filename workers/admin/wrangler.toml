name = "newsletter-admin"
main = "src/index.ts"
compatibility_date = "2025-01-15"

# The admin GUI is served on a custom hostname that is fronted by a
# Cloudflare Access application. Do NOT pre-create a DNS record for
# `console.eneanewsletter.it`; this route creates it automatically.
routes = [{ pattern = "console.eneanewsletter.it", custom_domain = true }]

# Tunables (sending identity, warmup config, Email Routing zone/worker, base
# domain, etc.) are no longer declared as vars here. They resolve from the D1
# `settings` table, falling back to the built-in defaults in shared/settings.ts;
# edit them there or in the console (which writes to the settings table).
#
# Email Routing automation (create/update/delete a rule inbound_address ->
# ingest worker on newsletter changes) additionally requires the CF_API_TOKEN
# secret (Email Routing Rules: Edit), set via `wrangler secret put CF_API_TOKEN`.
#
# Saving the sending domain (BASE_DOMAIN) on the Settings page auto-resolves the
# Email Routing zone id via the Cloudflare API. That lookup uses a separate
# read-only secret CF_READ_API_TOKEN (account-scoped, "Zone: Read"), set via
# `wrangler secret put CF_READ_API_TOKEN`. If unset, the domain still saves and
# the console warns that routing rules must be configured manually.

[[d1_databases]]
binding = "DB"
database_name = "newsletter_db"
database_id = "c6995e6a-216d-4ed2-9390-1fc36fb51f1b"

# Email Sending binding — used to send a welcome email to a newly added console
# user. Requires Email Sending (DKIM) to be enabled on the sending domain.
[[send_email]]
name = "SEND_EMAIL"

# R2 bucket for static assets (logos, header images, etc.) served by the
# admin GUI. Created in the EU jurisdiction, so the jurisdiction must be
# declared here or the binding won't resolve.
[[r2_buckets]]
binding = "ASSETS_R2"
bucket_name = "newsletter-admin"
jurisdiction = "eu"

# Static SPA built from /web is emitted to ./public by `npm run build:web`.
[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "single-page-application"

# Auth: this worker MUST be deployed behind a Cloudflare Access application.
# It has no secret of its own and trusts the
# `Cf-Access-Authenticated-User-Email` header injected by the Access edge.
