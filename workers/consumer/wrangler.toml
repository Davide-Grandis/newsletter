name = "newsletter-consumer"
main = "src/index.ts"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

# Tunables (sending identity, size cap, warmup schedule, etc.) are no longer
# declared here. They resolve from the D1 `settings` table, falling back to the
# built-in defaults in shared/settings.ts (edit them there or via the console).

[[d1_databases]]
binding = "DB"
database_name = "newsletter_db"
database_id = "c6995e6a-216d-4ed2-9390-1fc36fb51f1b"

[[r2_buckets]]
binding = "ARCHIVE"
bucket_name = "newsletter-archive"

[[send_email]]
name = "SEND_EMAIL"
# allowed_destination_addresses = []   # leave empty for any verified destination

# Producer binding — used to re-enqueue overflow when a daily/weekly cap is hit.
[[queues.producers]]
binding = "QUEUE"
queue = "newsletter-queue"

[[queues.consumers]]
queue = "newsletter-queue"
max_batch_size = 10
max_batch_timeout = 5
max_concurrency = 5
max_retries = 3
dead_letter_queue = "newsletter-dlq"
